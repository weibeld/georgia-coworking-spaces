## Terminal Batumi

**📅 First Visit Date:** Tuesday, 10 June 2026

**✏️  Remarks:** There are two floors but I visited only the ground floor (which may be noisier than the upper floor).

**✅ Pros:**

- Fridge, microwave
- Free trial on first day

**❌ Cons:**

- Limited number of desks
- Noisy from calls, conversations, kitchen, etc.

**❤️ Subjective Feeling:** ❤️❤️🩶

## CONA Coworking Space

**📅 First Visit Date:** Thursday, 18 June 2026

**✅ Pros:**

- Microwave
- Not many people (nobody at all on first visit date)
- One day pass valid for 24 hours

**❌ Cons:**

- No staff present, may need to call phone number to get access
- Door locked, can be only unlocked by staff or members with personal access code

**❤️ Subjective Feeling:** ❤️❤️🩶
